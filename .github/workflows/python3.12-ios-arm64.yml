name: Build Python 3.12 for iOS (arm64e Roothide) and package .deb

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    timeout-minutes: 30
    concurrency:
      group: ios-python3.12-arm64e-roothide-${{ github.ref }}
      cancel-in-progress: true
    env:
      PY_VER: 3.12.5
      LIBFFI_VER: 3.4.4
      MIN_IOS: 15.0 # Roothide target systems generally require iOS 15.0+
      ARCHS: arm64e # Targets arm64e slice
      THEOS_PACKAGE_SCHEME: roothide # Signals Roothide environment mapping
      OPENSSL_BRANCH: OpenSSL_1_1_1-stable

    steps:
      # ---------------------------------------------
      # Checkout repository
      # ---------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------
      # Discover iOS SDK version (for caching/debug)
      # ---------------------------------------------
      - name: Discover SDK version
        id: sdk
        run: |
          echo "version=$(xcrun --sdk iphoneos --show-sdk-version)" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------
      # Restore dependency cache (OpenSSL, libffi)
      # ---------------------------------------------
      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            work/deps/openssl-ios
            work/deps/libffi-ios
          # Note: arm64e added to the key so it separates from standard rootless caches
          key: ios-${{ runner.os }}-sdk-${{ steps.sdk.outputs.version }}-arm64e-openssl-${{ env.OPENSSL_BRANCH }}-libffi-${{ env.LIBFFI_VER }}-hash-${{ hashFiles('scripts/*.sh', '.github/workflows/*.yml') }}
          restore-keys: |
            ios-${{ runner.os }}-sdk-${{ steps.sdk.outputs.version }}-arm64e-openssl-${{ env.OPENSSL_BRANCH }}-libffi-${{ env.LIBFFI_VER }}-
            ios-${{ runner.os }}-sdk-${{ steps.sdk.outputs.version }}-arm64e-

      # ---------------------------------------------
      # Install required build tools via Homebrew
      # ---------------------------------------------
      - name: Install build tools
        run: |
          bash scripts/install-build-tools.sh

      # ---------------------------------------------
      # Prepare host Python 3.12 used by CPython's build
      # ---------------------------------------------
      - name: Set up Python 3.12 for host build
        id: py
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ---------------------------------------------
      # Build dependencies and CPython, then package .deb
      # ---------------------------------------------
      - name: Build Python 3.12 for iOS and package .deb
        env:
          PY_VER: 3.12.5
          LIBFFI_VER: 3.4.4
          MIN_IOS: 15.0
          ARCHS: arm64e
          THEOS_PACKAGE_SCHEME: roothide
          OPENSSL_BRANCH: OpenSSL_1_1_1-stable
        run: |
          set -euxo pipefail
          
          # Force compiler flags globally inside the runner environment
          export CFLAGS="-arch arm64e -miphoneos-version-min=15.0"
          export LDFLAGS="-arch arm64e -miphoneos-version-min=15.0"
          
          source scripts/common-env.sh

          # 1) OpenSSL 1.1.1 (stable)
          bash scripts/build-openssl.sh

          # 2) libffi (static)
          bash scripts/build-libffi.sh

          # 3) CPython 3.12 build and stage
          PYTHON_FOR_BUILD="${{ steps.py.outputs.python-path }}" bash scripts/build-python.sh

          # 4) .deb packaging
          bash scripts/package-dpkg.sh

      # ---------------------------------------------
      # Upload artifact (.deb)
      # ---------------------------------------------
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: python3.12_${{ env.PY_VER }}_iphoneos-arm64e-roothide
          path: work/*.deb
